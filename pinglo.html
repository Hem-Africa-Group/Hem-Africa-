<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./Hem V2 Logo.jpeg" />
    <title>Coming Soon | H.E.M. Africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --void: #020202; }
        body { background-color: var(--void); color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(to bottom right, #fff, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6 overflow-hidden">

    <!-- Background Glow -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>

    <main class="glass p-8 md:p-16 rounded-[3rem] w-full max-w-lg text-center border border-white/10 shadow-2xl">
        
        <!-- Logo Placeholder -->
        <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-8 border border-white/10">
            <svg class="w-8 h-8 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>

        <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-4 gradient-text">
            Under Development
        </h1>
        
        <p class="text-gray-400 text-sm md:text-base leading-relaxed mb-8">
            The next era of H.E.M. Africa digital infrastructure is currently being compiled. Our systems are synchronizing for launch.
        </p>

        <form id="notify-form" class="space-y-4">
            <input type="email" placeholder="Enter your email for access" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition text-white placeholder-gray-600 text-sm" required>
            <button type="submit" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-gray-200 transition text-sm">
                Notify Me When Live
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/5 text-[10px] text-gray-500 uppercase tracking-[0.2em]">
            H.E.M. Africa Digital Infrastructure
        </div>
    </main>

    <footer class="absolute bottom-8 text-[11px] text-gray-600">
        © 2026 H.E.M. Africa Group
    </footer>

    <script>
        document.getElementById('notify-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Payload Queued';
            btn.classList.replace('bg-white', 'bg-blue-600');
            btn.classList.replace('text-black', 'text-white');
            btn.disabled = true;
        });
    </script>
</body>
</html>
