<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | H.E.M. Africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-[#001f5c] text-white p-6 hidden md:flex flex-col">
        <h1 class="text-xl font-black mb-10 tracking-tighter">H.E.M. <span class="text-[#003399]">ADMIN</span></h1>
        <nav class="space-y-4 flex-grow">
            <a href="#" class="flex items-center gap-3 text-white/80 hover:text-white font-bold"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
            <a href="#" class="flex items-center gap-3 text-white/80 hover:text-white"><i data-lucide="briefcase" class="w-5 h-5"></i> Partnerships</a>
            <a href="#" class="flex items-center gap-3 text-white/80 hover:text-white"><i data-lucide="newspaper" class="w-5 h-5"></i> Newsroom</a>
            <a href="#" class="flex items-center gap-3 text-white/80 hover:text-white"><i data-lucide="users" class="w-5 h-5"></i> Users</a>
        </nav>
        <button class="flex items-center gap-2 text-white/50 hover:text-white"><i data-lucide="log-out" class="w-5 h-5"></i> Logout</button>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold text-[#001f5c]">Welcome back, Admin</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500 font-bold">June 12, 2026</span>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl border border-[#e1e8f0] shadow-sm">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Pending Inquiries</p>
                <h3 class="text-4xl font-black mt-2 text-[#003399]">14</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-[#e1e8f0] shadow-sm">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Active Partnerships</p>
                <h3 class="text-4xl font-black mt-2 text-[#003399]">82</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-[#e1e8f0] shadow-sm">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Site Visitors</p>
                <h3 class="text-4xl font-black mt-2 text-[#003399]">1.2k</h3>
            </div>
        </section>

        <section class="bg-white rounded-2xl border border-[#e1e8f0] shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-6 font-bold text-sm text-gray-500 uppercase">Partner Name</th>
                        <th class="p-6 font-bold text-sm text-gray-500 uppercase">Type</th>
                        <th class="p-6 font-bold text-sm text-gray-500 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b">
                        <td class="p-6 font-semibold">Global Tech Corp</td>
                        <td class="p-6">Technology</td>
                        <td class="p-6"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Active</span></td>
                    </tr>
                    <tr class="border-b">
                        <td class="p-6 font-semibold">University of Lagos</td>
                        <td class="p-6">Education</td>
                        <td class="p-6"><span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">Pending</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
