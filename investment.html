<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Investment | H.E.M. Africa Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #003399; --deep: #001f5c; --border: #e2e8f0; }
        body { background: #fff; color: #1a1a1b; font-family: 'Inter', sans-serif; padding: 60px; }
        .hero-invest { border-left: 8px solid var(--accent); padding-left: 30px; margin-bottom: 60px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 60px; }
        .stat-card { padding: 30px; background: #f8fafc; border: 1px solid var(--border); }
        .stat-card h3 { font-size: 2.5rem; color: var(--accent); font-weight: 800; }
        .stat-card p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }
        .btn-deck { background: var(--deep); color: white; padding: 20px 40px; text-decoration: none; font-weight: 800; font-size: 0.8rem; display: inline-block; }
    </style>
</head>
<body>
    <div class="hero-invest">
        <p style="text-transform: uppercase; letter-spacing: 2px; font-weight: 800; color: var(--accent); font-size: 0.7rem;">Capital & Growth</p>
        <h1 style="font-size: 3.5rem; color: var(--deep); line-height: 1;">Institutional Portfolio <br>Opportunities.</h1>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><h3>$200,000+</h3><p>Target Ecosystem Valuation</p></div>
        <div class="stat-card"><h3>2</h3><p>Active Subsidiaries</p></div>
        <div class="stat-card"><h3>NG/US</h3><p>Operational Regions</p></div>
    </div>
    <div style="background: #001f5c; color: white; padding: 60px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2>Series A Funding Round</h2>
            <p style="opacity: 0.7;">Securing infrastructure for the next 10 million users.</p>
        </div>
        <a href="#" class="btn-deck">REQUEST PITCH DECK</a>
    </div>
</body>
</html>
